name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Vite 8 requires Node ^20.19.0 || >=22.12.0
        # pnpm 11 requires Node 22+
        version:
          - node: "22.12.0"
          - node: "24"
          - node: "26"

    name: Node.js ${{ matrix.version.node }}
    env:
      NODE_VERSION: ${{ matrix.version.node }}
      FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules/.cache/turbo
            node_modules/.pnpm
          key: ${{ runner.os }}-node${{ matrix.version.node }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version.node }}

      - run: npm install -g corepack@latest

      - run: corepack enable && pnpm --version

      # NOTE: Avoid --loglevel=error: pnpm may set npm_config_loglevel for lifecycle scripts (e.g.
      # workerd install calling npm). That can hide stderr from failures. Hooks are skipped in CI.
      - run: pnpm install --recursive --no-frozen-lockfile
        env:
          SKIP_INSTALL_SIMPLE_GIT_HOOKS: '1'

      - run: pnpm examples-catalog:check

      - run: pnpm build

      - run: pnpm run test

      - name: Generate coverage
        run: pnpm coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
