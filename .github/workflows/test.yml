name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # pnpm 11.13 requires Node >= 22.13
        version:
          - node: '22.13.0'
          - node: '24'

    name: Node.js ${{ matrix.version.node }}
    env:
      NODE_VERSION: ${{ matrix.version.node }}
      FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.version.node }}

      # NOTE: Avoid --loglevel=error: pnpm may set npm_config_loglevel for lifecycle scripts (e.g.
      # workerd install calling npm). That can hide stderr from failures. Hooks are skipped in CI.
      - run: pnpm install --recursive --frozen-lockfile
        env:
          SKIP_INSTALL_SIMPLE_GIT_HOOKS: '1'

      - run: pnpm examples-catalog:check

      - run: pnpm build

      - run: pnpm run test

      - name: Generate coverage
        run: pnpm coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
