packages:
  - 'examples/*'
  - 'playgrounds/*'
  - 'playgrounds/router/routes/*'
  - 'playgrounds/widget/packages/*'
  - 'packages/*'
  - 'internal/*'
  - 'benchmarks/*'
  - 'tests/*'

# Migrated from .npmrc (pnpm 11 no longer reads non-auth settings from .npmrc)
hoist: false
linkWorkspacePackages: true
strictPeerDependencies: true
dedupePeerDependents: true
autoInstallPeers: true
publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - 'lint-staged'
  - '@commitlint/cli'
  - '@babel/preset-react'

# Migrated from package.json "pnpm" field (pnpm 11 no longer reads it)
allowBuilds:
  esbuild: true
  sharp: true
  simple-git-hooks: false
  unrs-resolver: true
  workerd: true

overrides:
  '@types/node': 'catalog:'
  'typescript': 'catalog:'

packageExtensions:
  '@cloudflare/vitest-pool-workers':
    dependencies:
      undici: '^7.24.8'

patchedDependencies:
  'yargs@17.7.2': 'patches/yargs@17.7.2.patch'

peerDependencyRules:
  allowedVersions:
    '@vitejs/plugin-vue2>vite': '8'

# Override pnpm 11 default (minimumReleaseAge: 1440) to avoid blocking newly published packages
minimumReleaseAge: 0

catalog:
  '@types/jest': ^29.5.12
  '@jest/globals': ^29.7.0
  '@types/node': '^22.2.0'
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  'react': ^19.2.6
  'react-dom': ^19.2.6
  'svelte': ^5.56.4
  'solid-js': ^1.9.14
  'preact': ^10.29.7
  'lit': ^3.3.3
  '@sveltejs/vite-plugin-svelte': ^7.2.0
  'vite-plugin-solid': ^2.11.12
  'vite': ^8.0.12
  'vitest': ^4.1.6
  '@cloudflare/vitest-pool-workers': ^0.16.4
  'tsup': ^8.3.4
  'jest': ^29.7.0
  'ts-jest': 29.2.1
  'jest-environment-miniflare': ^2.14.4
  'miniflare': ^4.20250409.0
  'typescript': ^5.9.3
  '@rollup/pluginutils': ^5.1.4
  'rolldown': ^1.0.0
