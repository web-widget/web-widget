<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="server-version" content="__SERVER_VERSION__" />
    <meta name="module-version" content="__MODULE_VERSION__" />
    <meta name="app-version" content="__APP_VERSION__" />
    <title>Web Widget integration fixture</title>
  </head>
  <body>
    <main data-testid="fixture" data-server-rendered="true">
      <h1>Integration fixture</h1>
      <p data-testid="status">Waiting for client</p>
      <a data-route-structure="__ROUTE_STRUCTURE__" href="__ROUTE_STRUCTURE__"
        >Route probe</a
      >
      <section data-owner="route">
        <span data-case="C01">C01</span>
        <span class="__ROUTE_MODULE_CLASS__" data-case="C02">C02</span>
        <span data-case="C03" data-v-vue-matrix>C03</span>
        <span data-case="C04" data-v-vue-matrix>C04</span>
      </section>
      <section data-testid="widget" data-widget-state="0">
        <span data-case="C05">C05</span>
        <span class="ww_widget_probe" data-case="C06">C06</span>
        <span data-case="C07" data-v-vue-matrix>C07</span>
        <span data-case="C08" data-v-vue-matrix>C08</span>
        <button data-testid="increment" type="button">Increment</button>
      </section>
      <div data-vue-style-loader hidden></div>
    </main>
    <!-- prettier-ignore -->
    <web-widget inactive recovering root="light" adapter="react" data-hydration-widget="react"><div data-mount-root="react"><slot name="label"></slot><span class="hydration-probe react-probe shadow-boundary-probe" data-hydration-probe="react">__REACT_LABEL__ <!-- -->0</span><button data-hydration-increment="react" type="button">Increment</button></div></web-widget>
    <!-- prettier-ignore -->
    <web-widget inactive recovering root="light" adapter="vue" data-hydration-widget="vue"><div data-mount-root="vue"><slot name="label"></slot><span class="hydration-probe vue-probe shadow-boundary-probe" data-hydration-probe="vue">Vue 0</span><button data-hydration-increment="vue" type="button">Increment</button></div></web-widget>
    <!-- prettier-ignore -->
    <web-widget inactive recovering root="light" adapter="preact" data-hydration-widget="preact"><div data-mount-root="preact"><slot name="label"></slot><span class="shadow-boundary-probe" data-hydration-probe="preact">Preact 0</span><button data-hydration-increment="preact" type="button">Increment</button></div></web-widget>
    <!-- prettier-ignore -->
    <web-widget id="solid-light" inactive recovering root="light" adapter="solid" data-hydration-widget="solid">__SOLID_LIGHT_SSR__</web-widget>
    <!-- prettier-ignore -->
    <web-widget id="svelte-light" inactive recovering root="light" adapter="svelte" data-hydration-widget="svelte">__SVELTE_LIGHT_SSR__</web-widget>
    <span class="shadow-boundary-probe" data-shadow-outside-probe
      >Document style probe</span
    >
    <!-- prettier-ignore -->
    <web-widget inactive recovering root="shadow" adapter="react" data-shadow-widget="react"><template shadowrootmode="open"><style data-web-widget-style="shadow-react-module">:host{display:block}.shadow-boundary-probe{--shadow-style-owner:module;color:rgb(20, 90, 110)}</style><style data-web-widget-style="shadow-react-override">.shadow-boundary-probe{--shadow-style-owner:override;color:rgb(30, 120, 70)}</style><slot name="web-widget-pending"></slot><web-widget-root style="display:contents"><div data-mount-root="react"><slot name="label"></slot><span class="hydration-probe react-probe shadow-boundary-probe" data-hydration-probe="react">__REACT_LABEL__ <!-- -->0</span><button data-hydration-increment="react" type="button">Increment</button></div></web-widget-root></template><web-widget-pending aria-busy="true" slot="web-widget-pending" style="display:contents" data-shadow-pending="react">Pending</web-widget-pending><span slot="label" data-shadow-label="react">React label</span><script type="application/json" slot="web-widget-state" data-shadow-state="react">{}</script></web-widget>
    <!-- prettier-ignore -->
    <web-widget inactive recovering root="shadow" adapter="vue" data-shadow-widget="vue"><template shadowrootmode="open"><style data-web-widget-style="shadow-vue-module">:host{display:block}.shadow-boundary-probe{--shadow-style-owner:module;color:rgb(20, 90, 110)}</style><style data-web-widget-style="shadow-vue-override">.shadow-boundary-probe{--shadow-style-owner:override;color:rgb(30, 120, 70)}</style><slot name="web-widget-pending"></slot><web-widget-root style="display:contents"><div data-mount-root="vue"><slot name="label"></slot><span class="hydration-probe vue-probe shadow-boundary-probe" data-hydration-probe="vue">Vue 0</span><button data-hydration-increment="vue" type="button">Increment</button></div></web-widget-root></template><web-widget-pending aria-busy="true" slot="web-widget-pending" style="display:contents" data-shadow-pending="vue">Pending</web-widget-pending><span slot="label" data-shadow-label="vue">Vue label</span><script type="application/json" slot="web-widget-state" data-shadow-state="vue">{}</script></web-widget>
    <!-- prettier-ignore -->
    <web-widget inactive recovering root="shadow" adapter="preact" data-shadow-widget="preact"><template shadowrootmode="open"><style data-web-widget-style="shadow-preact-module">:host{display:block}.shadow-boundary-probe{--shadow-style-owner:module;color:rgb(20, 90, 110)}</style><style data-web-widget-style="shadow-preact-override">.shadow-boundary-probe{--shadow-style-owner:override;color:rgb(30, 120, 70)}</style><slot name="web-widget-pending"></slot><web-widget-root style="display:contents"><div data-mount-root="preact"><slot name="label"></slot><span class="shadow-boundary-probe" data-hydration-probe="preact">Preact 0</span><button data-hydration-increment="preact" type="button">Increment</button></div></web-widget-root></template><web-widget-pending aria-busy="true" slot="web-widget-pending" style="display:contents" data-shadow-pending="preact">Pending</web-widget-pending><span slot="label" data-shadow-label="preact">Preact label</span><script type="application/json" slot="web-widget-state" data-shadow-state="preact">{}</script></web-widget>
    <!-- prettier-ignore -->
    <web-widget id="solid-shadow" inactive recovering root="shadow" adapter="solid" data-shadow-widget="solid"><template shadowrootmode="open"><style data-web-widget-style="shadow-solid-module">:host{display:block}.shadow-boundary-probe{--shadow-style-owner:module;color:rgb(20, 90, 110)}</style><style data-web-widget-style="shadow-solid-override">.shadow-boundary-probe{--shadow-style-owner:override;color:rgb(30, 120, 70)}</style><slot name="web-widget-pending"></slot><web-widget-root style="display:contents">__SOLID_SHADOW_SSR__</web-widget-root></template><web-widget-pending aria-busy="true" slot="web-widget-pending" style="display:contents" data-shadow-pending="solid">Pending</web-widget-pending><span slot="label" data-shadow-label="solid">Solid label</span><script type="application/json" slot="web-widget-state" data-shadow-state="solid">{}</script></web-widget>
    <!-- prettier-ignore -->
    <web-widget id="solid-late-shadow" inactive recovering root="shadow" adapter="solid" data-late-shadow-widget="solid"><template shadowrootmode="open"><web-widget-root style="display:contents">__SOLID_LATE_SHADOW_SSR__</web-widget-root></template></web-widget>
    <!-- prettier-ignore -->
    <web-widget id="svelte-shadow" inactive recovering root="shadow" adapter="svelte" data-shadow-widget="svelte"><template shadowrootmode="open"><style data-web-widget-style="shadow-svelte-module">:host{display:block}.shadow-boundary-probe{--shadow-style-owner:module;color:rgb(20, 90, 110)}</style><style data-web-widget-style="shadow-svelte-override">.shadow-boundary-probe{--shadow-style-owner:override;color:rgb(30, 120, 70)}</style><slot name="web-widget-pending"></slot><web-widget-root style="display:contents">__SVELTE_SHADOW_SSR__</web-widget-root></template><web-widget-pending aria-busy="true" slot="web-widget-pending" style="display:contents" data-shadow-pending="svelte">Pending</web-widget-pending><span slot="label" data-shadow-label="svelte">Svelte label</span><script type="application/json" slot="web-widget-state" data-shadow-state="svelte">{}</script></web-widget>
    <script>
      window.__hydrationErrors = [];
      window.__ssrNodes = {};
      for (const adapter of ['react', 'vue', 'preact', 'solid', 'svelte']) {
        const host = document.querySelector(
          `[data-hydration-widget="${adapter}"]`
        );
        window.__ssrNodes[`${adapter}:host`] = host;
        window.__ssrNodes[`${adapter}:root`] =
          host.querySelector('[data-mount-root]');
        window.__ssrNodes[`${adapter}:probe`] = host.querySelector(
          '[data-hydration-probe]'
        );
        const shadowHost = document.querySelector(
          `[data-shadow-widget="${adapter}"]`
        );
        window.__ssrNodes[`shadow:${adapter}:host`] = shadowHost;
        window.__ssrNodes[`shadow:${adapter}:container`] =
          shadowHost.shadowRoot?.querySelector('web-widget-root');
        window.__ssrNodes[`shadow:${adapter}:root`] =
          shadowHost.shadowRoot?.querySelector('[data-mount-root]');
        window.__ssrNodes[`shadow:${adapter}:probe`] =
          shadowHost.shadowRoot?.querySelector('[data-hydration-probe]');
      }
      const lateSolidHost = document.querySelector(
        '[data-late-shadow-widget="solid"]'
      );
      window.__ssrNodes['shadow:solid-late:root'] =
        lateSolidHost.shadowRoot?.querySelector('[data-mount-root]');
      window.__ssrNodes['shadow:solid-late:probe'] =
        lateSolidHost.shadowRoot?.querySelector('[data-hydration-probe]');
      document.addEventListener('web-widget:hydration-error', (event) => {
        window.__hydrationErrors.push(event.detail);
      });
      addEventListener('error', (event) =>
        window.__hydrationErrors.push(event.error)
      );
      addEventListener('unhandledrejection', (event) =>
        window.__hydrationErrors.push(event.reason)
      );
    </script>
    <script type="module" src="/src/entry.client.ts?v=__APP_VERSION__"></script>
  </body>
</html>
